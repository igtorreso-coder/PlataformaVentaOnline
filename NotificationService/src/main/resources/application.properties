spring.application.name=notification-service

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/notificaciones_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# JPA configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server configuration
server.port=8091

# Logging configuration
logging.level.org.springframework=INFO
logging.level.com.VentaOnline.NotificationService=DEBUG
logging.file.name=logs/notification-service.log

# Microservices URLs
servicios.usuarios.url=http://localhost:8081
