    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/carritos_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true"
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVICIOS_USUARIOS_URL: http://user-service:8081
