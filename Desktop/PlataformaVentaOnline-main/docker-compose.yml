services:
  mysql:
    image: mysql:8.0
    container_name: ecommerce-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    volumes:
      - ./mysql/init:/docker-entrypoint-initdb.d
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: user-service
    working_dir: /app
    volumes:
      - ./UserServices:/app
      - maven-cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/usuarios_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVICIOS_CATEGORIAS_URL: http://category-service:8082
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  category-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: category-service
    working_dir: /app
    volumes:
      - ./CategoryService:/app
      - maven-cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/categorias_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVICIOS_USUARIOS_URL: http://user-service:8081
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  product-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: product-service
    working_dir: /app
    volumes:
      - ./ProductService:/app
      - maven-cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/productos_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVICIOS_CATEGORIAS_URL: http://category-service:8082
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  inventory-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: inventory-service
    working_dir: /app
    volumes:
      - ./InventoryService:/app
      - maven-cache:/root/.m2
    command: mvn spring-boot:run
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/inventario_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SERVICIOS_PRODUCTOS_URL: http://product-service:8083
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  auth-service:
    image: maven:3.9-eclipse-temurin-17
    container_name: auth-service
    working_dir: /app
    volumes:
      - ./AuthService:/app
      - maven-cache:/root/.m2
