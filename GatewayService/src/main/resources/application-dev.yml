spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/usuarios/**
        - id: category-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/categorias/**
        - id: product-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/productos/**
        - id: inventory-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/inventarios/**
        - id: order-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/pedidos/**
        - id: payment-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/pagos/**
        - id: shipping-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/envios/**
        - id: cart-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/carritos/**
        - id: discount-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/descuentos/**
        - id: auth-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/auth/**
        - id: notification-service
          uri: http://localhost:8191
          predicates:
            - Path=/api/notificaciones/**
server:
  port: 8080
